<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007BFF;
            color: white;
            font-size: 1rem;
        }
        button:disabled {
            background-color: #cccccc;
        }
        #emotion {
            font-size: 1.5rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Emotion Detection</h1>
    <video id="video" width="640" height="480" autoplay></video>
    <canvas id="canvas" width="640" height="480" style="display: none;"></canvas>
    <button id="startStopBtn">Start Video</button>
    <p id="emotion">Emotion: <span></span></p>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const emotionText = document.querySelector('#emotion span');
        const startStopBtn = document.getElementById('startStopBtn');
        
        let isStreaming = false;
        let intervalId;

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    video.srcObject = stream;
                    video.play();
                    isStreaming = true;
                    startStopBtn.innerText = "Stop Video";
                })
                .catch(error => console.error('Error accessing the webcam.', error));
            
            intervalId = setInterval(() => {
                const context = canvas.getContext('2d');
                context.drawImage(video, 0, 0, 640, 480);
                const dataURL = canvas.toDataURL('image/jpeg');
                fetch('/process_frame', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ image: dataURL })
                })
                .then(response => response.json())
                .then(data => {
                    emotionText.textContent = data.emotion;
                })
                .catch(error => console.error('Error processing the frame.', error));
            }, 500);
        }

        function stopVideo() {
            if (video.srcObject) {
                const tracks = video.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                video.srcObject = null;
            }
            isStreaming = false;
            clearInterval(intervalId);
            startStopBtn.innerText = "Start Video";
        }

        startStopBtn.addEventListener('click', () => {
            if(isStreaming) {
                stopVideo();
            } else {
                startVideo();
            }
        });
    </script>
</body>
</html>
